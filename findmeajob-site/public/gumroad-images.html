<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gumroad Image Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
body{background:#09090b;color:#f4f4f5;font-family:'Inter',system-ui,sans-serif;padding:2rem;text-align:center}
h1{font-size:1.5rem;font-weight:800;margin-bottom:.5rem}
p{color:#a1a1aa;font-size:.85rem;margin-bottom:2rem}
.btn{display:inline-block;margin:.5rem;padding:.65rem 1.5rem;background:#10b981;color:#fff;border:none;border-radius:999px;font-size:.85rem;font-weight:700;cursor:pointer;font-family:inherit}
.btn:hover{background:#059669}
.preview{margin:1.5rem auto;border:1px solid rgba(255,255,255,.1);border-radius:12px;overflow:hidden;display:inline-block}
canvas{display:block}
hr{border:none;border-top:1px solid rgba(255,255,255,.1);margin:2rem 0}
</style>
</head>
<body>

<h1>Gumroad Marketing Images</h1>
<p>Click each button to download. All images ready for Gumroad upload.</p>

<button class="btn" onclick="makeCover()">Download Cover (1280x720)</button>
<button class="btn" onclick="makeThumbnail()">Download Thumbnail (600x600)</button>
<button class="btn" onclick="makeFeature1()">Feature: AI Matching (1280x720)</button>
<button class="btn" onclick="makeFeature2()">Feature: Multi-Country (1280x720)</button>
<button class="btn" onclick="makeFeature3()">Feature: Admin Dashboard (1280x720)</button>
<button class="btn" onclick="makeFeature4()">Feature: Blog + SEO (1280x720)</button>
<button class="btn" onclick="makeFeature5()">Feature: 5 Job APIs (1280x720)</button>
<button class="btn" onclick="makeFeature6()">Feature: Deploy in 30 Min (1280x720)</button>

<div id="preview-area"></div>

<script>
function createCanvas(w, h) {
  var cn = document.createElement("canvas");
  cn.width = w; cn.height = h;
  return cn;
}

function drawBg(ctx, W, H) {
  // Dark gradient background
  var bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, "#0f172a");
  bg.addColorStop(1, "#09090b");
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Accent glows
  var g1 = ctx.createRadialGradient(W*0.75, H*0.2, 0, W*0.75, H*0.2, W*0.4);
  g1.addColorStop(0, "rgba(16,185,129,.15)");
  g1.addColorStop(1, "transparent");
  ctx.fillStyle = g1;
  ctx.fillRect(0, 0, W, H);

  var g2 = ctx.createRadialGradient(W*0.2, H*0.8, 0, W*0.2, H*0.8, W*0.35);
  g2.addColorStop(0, "rgba(139,92,246,.1)");
  g2.addColorStop(1, "transparent");
  ctx.fillStyle = g2;
  ctx.fillRect(0, 0, W, H);

  // Top gradient bar
  var tl = ctx.createLinearGradient(0, 0, W, 0);
  tl.addColorStop(0, "transparent");
  tl.addColorStop(0.2, "#10b981");
  tl.addColorStop(0.5, "#8b5cf6");
  tl.addColorStop(0.8, "#ec4899");
  tl.addColorStop(1, "transparent");
  ctx.fillStyle = tl;
  ctx.fillRect(0, 0, W, 4);

  // Bottom gradient bar
  ctx.fillRect(0, H-4, W, 4);
}

function drawLogo(ctx, x, y, size) {
  // Green rounded square
  ctx.beginPath();
  ctx.roundRect(x, y, size, size, size*0.22);
  ctx.fillStyle = "#10b981";
  ctx.fill();
  // Magnifying glass
  var cx = x+size*0.41, cy = y+size*0.41, r = size*0.19;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.strokeStyle = "white";
  ctx.lineWidth = Math.max(2, size*0.08);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx+r*0.7, cy+r*0.7);
  ctx.lineTo(x+size*0.72, y+size*0.72);
  ctx.strokeStyle = "white";
  ctx.lineCap = "round";
  ctx.stroke();
}

function drawBadge(ctx, x, y, text, color) {
  ctx.font = "700 16px Inter, sans-serif";
  var tw = ctx.measureText(text).width;
  ctx.fillStyle = color.replace(")", ",.12)").replace("rgb", "rgba");
  ctx.beginPath();
  ctx.roundRect(x, y, tw+24, 30, 15);
  ctx.fill();
  ctx.fillStyle = color;
  ctx.fillText(text, x+12, y+21);
}

function downloadCanvas(cn, name) {
  var a = document.createElement("a");
  a.download = name + ".png";
  a.href = cn.toDataURL("image/png");
  a.click();
  // Show preview
  var area = document.getElementById("preview-area");
  area.innerHTML = '<div class="preview" style="max-width:100%;overflow-x:auto"><canvas id="preview-cn"></canvas></div>';
  var pcn = document.getElementById("preview-cn");
  pcn.width = cn.width;
  pcn.height = cn.height;
  pcn.style.width = Math.min(cn.width, 800) + "px";
  pcn.style.height = "auto";
  pcn.getContext("2d").drawImage(cn, 0, 0);
}

/* === COVER IMAGE 1280x720 === */
function makeCover() {
  var W=1280, H=720;
  var cn = createCanvas(W, H);
  var ctx = cn.getContext("2d");
  drawBg(ctx, W, H);

  // Logo
  drawLogo(ctx, 60, 40, 48);
  ctx.font = "800 22px Inter, sans-serif";
  ctx.textAlign = "left";
  ctx.fillStyle = "#ffffff";
  ctx.fillText("AI Job Board", 120, 72);

  // Main title — bigger, cleaner
  ctx.textAlign = "center";
  ctx.font = "900 80px Inter, sans-serif";
  ctx.fillStyle = "#ffffff";
  ctx.fillText("AI-POWERED", W/2, 240);
  ctx.fillStyle = "#10b981";
  ctx.fillText("JOB MATCHING", W/2, 330);

  // Subtitle
  ctx.font = "500 26px Inter, sans-serif";
  ctx.fillStyle = "#a1a1aa";
  ctx.fillText("Upload CV  \u2192  AI Matches Jobs  \u2192  Apply", W/2, 400);

  // Clean feature list — no badges, just text
  ctx.font = "600 18px Inter, sans-serif";
  ctx.fillStyle = "#71717a";
  var features = "5 Job APIs  \u2022  10 Countries  \u2022  Admin Dashboard  \u2022  Blog + SEO";
  ctx.fillText(features, W/2, 500);

  // Bottom
  ctx.font = "700 20px Inter, sans-serif";
  ctx.fillStyle = "#10b981";
  ctx.fillText("Full Source Code  \u2022  No Frameworks  \u2022  Deploy in 30 Min  \u2022  $5-20/mo", W/2, 560);

  ctx.font = "500 16px Inter, sans-serif";
  ctx.fillStyle = "#52525b";
  ctx.fillText("Vanilla JavaScript  \u2022  Vercel  \u2022  Upstash Redis  \u2022  Claude AI", W/2, 600);

  downloadCanvas(cn, "gumroad-cover");
}

/* === THUMBNAIL 600x600 === */
function makeThumbnail() {
  var W=600, H=600;
  var cn = createCanvas(W, H);
  var ctx = cn.getContext("2d");
  drawBg(ctx, W, H);

  drawLogo(ctx, W/2-30, 80, 60);

  ctx.textAlign = "center";
  ctx.font = "900 48px Inter, sans-serif";
  ctx.fillStyle = "#ffffff";
  ctx.fillText("AI JOB", W/2, 220);
  ctx.fillStyle = "#10b981";
  ctx.fillText("BOARD", W/2, 275);

  ctx.font = "500 18px Inter, sans-serif";
  ctx.fillStyle = "#a1a1aa";
  ctx.fillText("AI-Powered Job Matching", W/2, 330);
  ctx.fillText("Platform", W/2, 355);

  // Features list
  var features = ["CV Upload + AI Matching", "Multi-Country Support", "Admin Dashboard", "Blog + SEO", "Deploy in 30 Min"];
  ctx.font = "600 16px Inter, sans-serif";
  ctx.fillStyle = "#10b981";
  features.forEach(function(f, i) {
    ctx.fillText("\u2713 " + f, W/2, 420 + i*30);
  });

  ctx.font = "800 20px Inter, sans-serif";
  ctx.fillStyle = "#f59e0b";
  ctx.fillText("$49", W/2, 580);

  downloadCanvas(cn, "gumroad-thumbnail");
}

/* === FEATURE SLIDES === */
function makeFeatureSlide(title, subtitle, bullets, accentColor) {
  var W=1280, H=720;
  var cn = createCanvas(W, H);
  var ctx = cn.getContext("2d");
  drawBg(ctx, W, H);

  drawLogo(ctx, 60, 40, 40);
  ctx.font = "700 18px Inter, sans-serif";
  ctx.textAlign = "left";
  ctx.fillStyle = "#71717a";
  ctx.fillText("AI Job Board", 112, 66);

  // Title
  ctx.textAlign = "center";
  ctx.font = "900 56px Inter, sans-serif";
  ctx.fillStyle = accentColor;
  ctx.fillText(title, W/2, 180);

  // Subtitle
  ctx.font = "500 24px Inter, sans-serif";
  ctx.fillStyle = "#a1a1aa";
  ctx.fillText(subtitle, W/2, 230);

  // Bullets
  ctx.textAlign = "left";
  ctx.font = "600 22px Inter, sans-serif";
  var startY = 310;
  bullets.forEach(function(b, i) {
    ctx.fillStyle = accentColor;
    ctx.fillText("\u2713", 300, startY + i*50);
    ctx.fillStyle = "#e2e8f0";
    ctx.fillText(b, 340, startY + i*50);
  });

  return cn;
}

function makeFeature1() {
  var cn = makeFeatureSlide(
    "AI CV MATCHING",
    "Users upload their CV, AI finds the best jobs",
    [
      "Upload PDF, DOCX, or TXT",
      "Claude AI analyses skills and experience",
      "Matches to real jobs from 5 aggregator APIs",
      "Results in under 10 seconds",
      "Zero registration required"
    ],
    "#10b981"
  );
  downloadCanvas(cn, "feature-ai-matching");
}

function makeFeature2() {
  var cn = makeFeatureSlide(
    "10 COUNTRIES SUPPORTED",
    "Built-in country selector with local job results",
    [
      "New Zealand, Australia, United Kingdom",
      "United States, Canada, Germany, France",
      "India, Singapore, South Africa",
      "Country picker on homepage",
      "Easy to add more countries in config.js"
    ],
    "#8b5cf6"
  );
  downloadCanvas(cn, "feature-multi-country");
}

function makeFeature3() {
  var cn = makeFeatureSlide(
    "ADMIN DASHBOARD",
    "Manage everything from one panel",
    [
      "Approve, reject, feature job listings",
      "Manage job seekers and employers",
      "View stats (users, jobs, applications)",
      "AI blog content generator",
      "AI social media post + image generator"
    ],
    "#f59e0b"
  );
  downloadCanvas(cn, "feature-admin-dashboard");
}

function makeFeature4() {
  var cn = makeFeatureSlide(
    "BLOG + SEO",
    "Built-in blog system optimised for search engines",
    [
      "AI generates SEO articles with one click",
      "Individual URLs per post (/blog/your-title)",
      "Schema.org structured data on every page",
      "Dynamic XML sitemap + RSS feed",
      "Edit published posts inline from admin"
    ],
    "#ec4899"
  );
  downloadCanvas(cn, "feature-blog-seo");
}

function makeFeature5() {
  var cn = makeFeatureSlide(
    "5 JOB AGGREGATOR APIs",
    "Choose your job data source in config.js",
    [
      "Adzuna — 15+ countries, free",
      "JSearch (RapidAPI) — global coverage",
      "Jooble — 60+ countries, free",
      "Careerjet — 50+ countries",
      "Reed — UK focused"
    ],
    "#14b8a6"
  );
  downloadCanvas(cn, "feature-job-apis");
}

function makeFeature6() {
  var cn = makeFeatureSlide(
    "DEPLOY IN 30 MINUTES",
    "Free hosting, minimal running costs",
    [
      "Vercel hosting — free tier",
      "Upstash Redis database — free tier",
      "Claude AI — $5-20/month",
      "No frameworks, no build step",
      "Edit config.js, push to GitHub, done"
    ],
    "#10b981"
  );
  downloadCanvas(cn, "feature-deploy");
}
</script>
</body>
</html>
